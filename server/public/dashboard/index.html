<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봉이모바일 에이전트 대시보드</title>
<style>
:root { --bg:#0d1117; --card:#161b22; --border:#30363d; --blue:#58a6ff; --green:#3fb950; --yellow:#d29922; --red:#f85149; --purple:#bc8cff; --text:#c9d1d9; --text2:#8b949e; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); padding:20px; }
h1 { font-size:20px; margin-bottom:4px; }
.sub { font-size:12px; color:var(--text2); margin-bottom:20px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
.kpi { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
.kpi-val { font-size:28px; font-weight:700; font-family:monospace; }
.kpi-label { font-size:11px; color:var(--text2); margin-top:4px; }
.section { margin-bottom:20px; }
.section-title { font-size:13px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.agent-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.agent-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px; position:relative; }
.agent-card.active { border-color:var(--green); }
.agent-card.idle { border-color:var(--yellow); }
.agent-card.offline { opacity:.5; }
.agent-name { font-size:14px; font-weight:600; margin-bottom:4px; }
.agent-role { font-size:11px; color:var(--text2); }
.agent-status { display:inline-flex; align-items:center; gap:4px; font-size:11px; margin-top:8px; padding:2px 8px; border-radius:10px; font-weight:600; }
.s-active { background:rgba(63,185,80,.15); color:var(--green); }
.s-idle { background:rgba(210,153,34,.15); color:var(--yellow); }
.s-offline { background:rgba(139,148,158,.15); color:var(--text2); }
.dot { width:6px; height:6px; border-radius:50%; }
.dot-green { background:var(--green); }
.dot-yellow { background:var(--yellow); }
.dot-red { background:var(--red); }
.dot-gray { background:var(--text2); }
.task-list { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.task-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); font-size:13px; }
.task-item:last-child { border-bottom:none; }
.task-status { width:20px; text-align:center; }
.task-name { flex:1; }
.task-owner { font-size:11px; color:var(--text2); }
.log-area { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px; max-height:300px; overflow-y:auto; font-family:monospace; font-size:12px; line-height:1.8; }
.log-line { color:var(--text2); }
.log-line .time { color:var(--text2); }
.log-line .agent { color:var(--blue); font-weight:600; }
.log-line .action { color:var(--text); }
.git-info { display:flex; gap:16px; font-size:12px; color:var(--text2); margin-bottom:20px; }
.git-info span { color:var(--text); font-weight:600; }
.refresh-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.refresh-btn { background:var(--blue); color:#fff; border:none; padding:6px 14px; border-radius:6px; font-size:12px; cursor:pointer; font-weight:600; }
.auto-refresh { font-size:11px; color:var(--text2); }
</style>
</head>
<body>

<div class="refresh-bar">
  <div>
    <h1>🐟 봉이모바일 에이전트 대시보드</h1>
    <div class="sub">Claude Forge 팀 실시간 모니터링</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="auto-refresh">자동 갱신: <span id="countdown">5</span>초</span>
    <button class="refresh-btn" onclick="refresh()">↻ 새로고침</button>
  </div>
</div>

<div class="git-info" id="git-info">
  <div>Branch: <span id="git-branch">-</span></div>
  <div>Commits: <span id="git-commits">-</span></div>
  <div>마지막 커밋: <span id="git-last">-</span></div>
  <div>변경 파일: <span id="git-dirty">-</span></div>
</div>

<div class="grid" id="kpi-grid">
  <div class="kpi"><div class="kpi-val" style="color:var(--blue)" id="kpi-agents">0</div><div class="kpi-label">활성 에이전트</div></div>
  <div class="kpi"><div class="kpi-val" style="color:var(--green)" id="kpi-tasks-done">0</div><div class="kpi-label">완료 태스크</div></div>
  <div class="kpi"><div class="kpi-val" style="color:var(--yellow)" id="kpi-tasks-progress">0</div><div class="kpi-label">진행 중</div></div>
  <div class="kpi"><div class="kpi-val" style="color:var(--text2)" id="kpi-tasks-pending">0</div><div class="kpi-label">대기</div></div>
</div>

<div class="section">
  <div class="section-title">에이전트 상태</div>
  <div class="agent-grid" id="agent-grid"></div>
</div>

<div class="section">
  <div class="section-title">태스크 현황</div>
  <div class="task-list" id="task-list"></div>
</div>

<div class="section">
  <div class="section-title">활동 로그</div>
  <div class="log-area" id="log-area">
    <div class="log-line"><span class="time">--:--</span> 대시보드 시작됨. 데이터 로드 중...</div>
  </div>
</div>

<script>
const API = 'http://localhost:3001/api';

const AGENTS = [
  { name:'architect', role:'구조 설계', icon:'🏗️' },
  { name:'planner', role:'구현 계획', icon:'📋' },
  { name:'code-reviewer', role:'코드 리뷰', icon:'🔍' },
  { name:'security-reviewer', role:'보안 검사', icon:'🛡️' },
  { name:'database-reviewer', role:'DB 검증', icon:'🗄️' },
  { name:'tdd-guide', role:'테스트 주도', icon:'🧪' },
  { name:'build-error-resolver', role:'빌드 에러', icon:'🔧' },
  { name:'refactor-cleaner', role:'리팩토링', icon:'✨' },
  { name:'doc-updater', role:'문서 갱신', icon:'📝' },
  { name:'e2e-runner', role:'E2E 테스트', icon:'🎯' },
  { name:'verify-agent', role:'검증', icon:'✅' },
];

let logs = [];

function addLog(agent, action) {
  const now = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logs.unshift({ time:now, agent, action });
  if (logs.length > 50) logs.pop();
  renderLogs();
}

function renderLogs() {
  const el = document.getElementById('log-area');
  el.innerHTML = logs.map(l =>
    `<div class="log-line"><span class="time">${l.time}</span> <span class="agent">${l.agent}</span> <span class="action">${l.action}</span></div>`
  ).join('');
}

async function refresh() {
  // 에이전트 상태
  try {
    const res = await fetch(`${API}/dashboard/agents`);
    const data = await res.json();
    renderAgents(data.agents || []);
    renderTasks(data.tasks || []);
    renderKPI(data);
    renderGit(data.git || {});
  } catch(e) {
    // API 없으면 정적 렌더링
    renderAgents([]);
    renderTasks([]);
  }
}

function renderAgents(activeAgents) {
  const grid = document.getElementById('agent-grid');
  const activeNames = activeAgents.map(a => a.name);

  grid.innerHTML = AGENTS.map(a => {
    const active = activeAgents.find(aa => aa.name === a.name);
    const cls = active ? (active.status === 'working' ? 'active' : 'idle') : 'offline';
    const statusCls = active ? (active.status === 'working' ? 's-active' : 's-idle') : 's-offline';
    const statusText = active ? (active.status === 'working' ? active.task || '작업 중' : '대기') : '미소집';
    const dotCls = active ? (active.status === 'working' ? 'dot-green' : 'dot-yellow') : 'dot-gray';

    return `<div class="agent-card ${cls}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="agent-name">${a.icon} ${a.name}</div>
      </div>
      <div class="agent-role">${a.role}</div>
      <div class="agent-status ${statusCls}"><div class="dot ${dotCls}"></div>${statusText}</div>
    </div>`;
  }).join('');

  document.getElementById('kpi-agents').textContent = activeAgents.filter(a=>a.status==='working').length;
}

function renderTasks(tasks) {
  const list = document.getElementById('task-list');
  if (!tasks.length) {
    list.innerHTML = '<div class="task-item" style="color:var(--text2)">태스크 없음</div>';
    return;
  }
  list.innerHTML = tasks.map(t => {
    const icon = t.status === 'completed' ? '✅' : t.status === 'in_progress' ? '🔄' : '⏳';
    return `<div class="task-item">
      <div class="task-status">${icon}</div>
      <div class="task-name">${t.subject || t.name}</div>
      <div class="task-owner">${t.owner || ''}</div>
    </div>`;
  }).join('');

  document.getElementById('kpi-tasks-done').textContent = tasks.filter(t=>t.status==='completed').length;
  document.getElementById('kpi-tasks-progress').textContent = tasks.filter(t=>t.status==='in_progress').length;
  document.getElementById('kpi-tasks-pending').textContent = tasks.filter(t=>t.status==='pending').length;
}

function renderKPI(data) {
  // 추가 KPI 업데이트
}

function renderGit(git) {
  document.getElementById('git-branch').textContent = git.branch || 'master';
  document.getElementById('git-commits').textContent = git.commits || '-';
  document.getElementById('git-last').textContent = git.lastCommit || '-';
  document.getElementById('git-dirty').textContent = git.dirty || '0';
}

// 자동 갱신 (5초)
let countdown = 5;
setInterval(() => {
  countdown--;
  document.getElementById('countdown').textContent = countdown;
  if (countdown <= 0) {
    countdown = 5;
    refresh();
  }
}, 1000);

// 초기 로드
refresh();
addLog('system', '대시보드 시작됨');
</script>
</body>
</html>
